name: Notebook Health Check

on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'  # 9am UTC on Jan 1, Apr 1, Jul 1, Oct 1
  push:
    branches:
      - refactor/notebook-testing
  workflow_dispatch:
    inputs:
      group:
        description: 'Notebook group to test'
        required: true
        type: choice
        options:
          - all
          - data-access
          - analysis
          - climate-profiles
          - collaborative

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.set-matrix.outputs.groups }}
    steps:
      - id: set-matrix
        run: |
          group="${{ github.event.inputs.group }}"
          if [ -z "$group" ] || [ "$group" = "all" ]; then
            echo 'groups=["data-access","analysis","climate-profiles","collaborative"]' >> $GITHUB_OUTPUT
          else
            echo "groups=[\"$group\"]" >> $GITHUB_OUTPUT
          fi

  run-notebooks:
    needs: setup
    strategy:
      matrix:
        group: ${{ fromJson(needs.setup.outputs.groups) }}
      fail-fast: false
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eagle-rock-analytics/cae-notebook:2026.02.18
      options: --user root
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install papermill, climakitae, and climakitaegui
        run: |
          # Mirrors the AE JupyterHub install workflow
          pip install papermill
          pip install git+https://github.com/cal-adapt/climakitae.git
          pip install --no-deps git+https://github.com/cal-adapt/climakitaegui.git

      - name: Run notebooks
        shell: bash
        run: |
          LOG=/tmp/notebook-results.log
          failed=""
          while IFS= read -r notebook; do
            echo "::group::$notebook"
            echo "RUNNING: $notebook (free mem: $(free -h | awk '/^Mem:/{print $4}'))" | tee -a "$LOG"
            start=$(date +%s)
            python3 .github/scripts/strip_skip_cells.py "$notebook" /tmp/processed.ipynb
            if papermill /tmp/processed.ipynb /dev/null --cwd "$(dirname "$notebook")" --no-progress-bar; then
              elapsed=$(( $(date +%s) - start ))
              echo "PASSED: $notebook (${elapsed}s)" | tee -a "$LOG"
            else
              elapsed=$(( $(date +%s) - start ))
              echo "FAILED: $notebook (${elapsed}s)" | tee -a "$LOG"
              failed="$failed\n$notebook"
            fi
            echo "::endgroup::"
          done < <(find "${{ matrix.group }}" -name "*.ipynb" | sort)

          if [ -n "$failed" ]; then
            echo -e "\nFailed notebooks:\n$failed" | tee -a "$LOG"
            exit 1
          fi
          echo "All notebooks passed!" | tee -a "$LOG"

      - name: Upload results log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-results-${{ matrix.group }}
          path: /tmp/notebook-results.log

  report:
    needs: run-notebooks
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: notebook-results-*
          path: /tmp/results

      - name: Open issue if notebooks failed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = '/tmp/results';
            const failed = [];

            for (const dir of fs.readdirSync(resultsDir)) {
              const logPath = path.join(resultsDir, dir, 'notebook-results.log');
              if (!fs.existsSync(logPath)) continue;
              for (const line of fs.readFileSync(logPath, 'utf8').split('\n')) {
                if (line.startsWith('FAILED:')) {
                  failed.push(line.replace('FAILED: ', '').split(' (')[0]);
                }
              }
            }

            if (failed.length === 0) return;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Notebook smoke test failures (${new Date().toISOString().split('T')[0]})`,
              body: `The following notebooks failed during the quarterly smoke test:\n\n${failed.map(nb => `- \`${nb}\``).join('\n')}\n\nSee the [workflow run](${runUrl}) for details.`,
              labels: ['bug']
            });

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Check links
        run: python .github/scripts/check_links.py

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Broken links detected in notebooks (${new Date().toISOString().split('T')[0]})`,
              body: `The link checker found broken links in notebooks.\n\nSee the [workflow run](${runUrl}) for details.`,
              labels: ['documentation']
            })
